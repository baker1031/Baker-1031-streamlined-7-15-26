[build]
  publish = "dist"
  command = "node scripts/build-aux-pages.mjs . && node scripts/build-property-types.mjs . && node scripts/build-offerings.mjs && node scripts/build-search-index.mjs"

[build.environment]
  # GRANOLA_OWNER_EMAIL is Jerry's public email (jerry@baker1031.com). The
  # Granola poller uses it to skip Jerry as a meeting attendee. That address
  # legitimately appears throughout the public site (bio, proposal-print.js,
  # article data), so Netlify's secret scanner flags it as a "leaked secret"
  # and fails the build. It is NOT a secret — exclude only this key from the
  # scan. The real secret (GRANOLA_API_KEY) is still scanned and never appears
  # in build output.
  #
  # SITE_RECAPTCHA_KEY is the PUBLIC reCAPTCHA site key — it is meant to be
  # embedded in index.html (client-side), so the scanner flags its value there
  # as a "leaked secret." It is not a secret. The private SITE_RECAPTCHA_SECRET
  # is NOT omitted and is still scanned, so a genuine leak would still fail the
  # build.
  SECRETS_SCAN_OMIT_KEYS = "GRANOLA_OWNER_EMAIL,SITE_RECAPTCHA_KEY"

# ---------- Redirects ----------
# Collapse the www redirect chain to a single hop to the apex host.
# (Also set https://baker1031.com as the Primary domain in Netlify → Domain management.)
[[redirects]]
  from = "https://www.baker1031.com/*"
  to = "https://baker1031.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.baker1031.com/*"
  to = "https://baker1031.com/:splat"
  status = 301
  force = true

# .html → extensionless: one clean, self-canonical URL per page.
[[redirects]]
  from = "/property-types.html"
  to = "/property-types"
  status = 301
  force = true
[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301
  force = true
[[redirects]]
  from = "/disclosures.html"
  to = "/disclosures"
  status = 301
  force = true
[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy-policy"
  status = 301
  force = true
[[redirects]]
  from = "/process.html"
  to = "/process"
  status = 301
  force = true
[[redirects]]
  from = "/accessibility.html"
  to = "/accessibility"
  status = 301
  force = true
[[redirects]]
  from = "/reg-bi.html"
  to = "/reg-bi"
  status = 301
  force = true
[[redirects]]
  from = "/ccpa.html"
  to = "/ccpa"
  status = 301
  force = true
[[redirects]]
  from = "/commitment-to-privacy.html"
  to = "/commitment-to-privacy"
  status = 301
  force = true

# ---------- Caching ----------
# Edge-cache the content pages (served static from dist) so they stay fast and
# survive crawl-load spikes. Netlify invalidates the edge cache on each deploy.
[[headers]]
  for = "/learn/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800, durable"
[[headers]]
  for = "/sponsors/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800, durable"
[[headers]]
  for = "/markets/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800, durable"
[[headers]]
  for = "/glossary/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800, durable"
[[headers]]
  for = "/property-types/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=86400, stale-while-revalidate=604800, durable"
[[headers]]
  for = "/offerings/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, durable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS/JS are referenced with content-hash ?v= fingerprints, so a change always
# produces a new URL — the files themselves can be cached immutably for a year.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/employee.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Post-submission scheduling + booking-confirmation pages — conversion
# endpoints, not landing pages. Keep them out of the index.
[[headers]]
  for = "/scheduled.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/call-confirmed.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Private, token-gated direct booking link for already-vetted contacts.
# Unlisted (not in nav/footer/sitemap) — keep it out of the index too.
[[headers]]
  for = "/book.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ---------- Security ----------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP in REPORT-ONLY mode first (audit): watch the console / reports for a week,
    # then move to Content-Security-Policy once no legitimate source is blocked.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://esm.sh https://link.msgsndr.com https://*.msgsndr.com https://*.leadconnectorhq.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com https://img.logo.dev https://assets.baker1031.com https://*.leadconnectorhq.com https://*.msgsndr.com; media-src 'self' https://res.cloudinary.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://auth.baker1031.com https://*.kinde.com https://link.msgsndr.com https://*.msgsndr.com https://*.leadconnectorhq.com; frame-src https://api.leadconnectorhq.com https://*.leadconnectorhq.com https://*.msgsndr.com https://auth.baker1031.com https://player.vimeo.com https://www.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://auth.baker1031.com"
