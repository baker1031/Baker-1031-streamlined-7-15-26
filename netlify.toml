[build]
  publish = "dist"
  command = "node scripts/build-aux-pages.mjs . && node scripts/build-property-types.mjs . && node scripts/build-offerings.mjs && node scripts/build-search-index.mjs"

[build.environment]
  # GRANOLA_OWNER_EMAIL is Jerry's public email (jerry@baker1031.com). The
  # Granola poller uses it to skip Jerry as a meeting attendee. That address
  # legitimately appears throughout the public site (bio, proposal-print.js,
  # article data), so Netlify's secret scanner flags it as a "leaked secret"
  # and fails the build. It is NOT a secret — exclude only this key from the
  # scan. The real secret (GRANOLA_API_KEY) is still scanned and never appears
  # in build output.
  SECRETS_SCAN_OMIT_KEYS = "GRANOLA_OWNER_EMAIL"

# ---------- Caching ----------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# CSS/JS are referenced with content-hash ?v= fingerprints, so a change always
# produces a new URL — the files themselves can be cached immutably for a year.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/employee.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ---------- Security ----------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP in REPORT-ONLY mode first (audit): watch the console / reports for a week,
    # then move to Content-Security-Policy once no legitimate source is blocked.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://app.cal.com https://*.cal.com https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com https://img.logo.dev https://assets.baker1031.com; media-src 'self' https://res.cloudinary.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://auth.baker1031.com https://*.kinde.com https://app.cal.com https://*.cal.com https://api.cal.com; frame-src https://app.cal.com https://*.cal.com https://auth.baker1031.com https://player.vimeo.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://auth.baker1031.com"
